name: Run Tests

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    name: Lint and Test
    env:
      TESTING: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python3 -m pip install -r backend/requirements.txt

      - name: Lint with flake8
        run: python3 -m flake8 backend/ --config=backend/.flake8

      - name: Check formatting with Black
        run: python3 -m black --check --line-length 79 backend/

      - name: Run tests
        run: sh ./scripts/test.sh
