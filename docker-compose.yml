# Local containerized development for Bulk Buddy.
# - Backend Flask API runs on 5001
# - Frontend React app runs on 3000 and proxies /api to backend
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bulk-buddy-backend
    ports:
      - "5001:5001"
    environment:
      - FLASK_APP=app:create_app
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      - SECRET_KEY=${SECRET_KEY}
      - PYTHONUNBUFFERED=1
    volumes:
      - backend_data:/app/instance

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bulk-buddy-frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
volumes:
  backend_data: